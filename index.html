<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>음악 젠더 인상 설문</title>

  <script src="https://unpkg.com/jspsych@7.3.4/dist/index.browser.js"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" />

  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3/dist/index.browser.js"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.3/dist/index.browser.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="./tracks.js"></script>

  <style>
    body { background: #fafafa; }
    .jspsych-content { max-width: 920px; text-align: left; }
    .survey-wrap { line-height: 1.8; font-size: 16px; }
    .question-block { margin: 24px 0; padding: 18px 20px; background: white; border: 1px solid #e5e5e5; border-radius: 12px; }
    .question-title { font-weight: 700; margin-bottom: 10px; }
    label { display: block; margin: 8px 0; cursor: pointer; }
    audio { width: 100%; margin-top: 10px; }
    textarea { width: 100%; min-height: 120px; padding: 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    input[type="text"], input[type="number"] { width: 100%; max-width: 500px; padding: 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-top: 8px; }
    .hidden { display: none; }
    .note { font-size: 14px; color: #666; margin-top: 8px; }
    .warning { color: #c0392b; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body></body>

<script>
  // =========================
  // 1. 기본 확인 로그 및 데이터 체크
  // =========================
  const sourceTracks = window.TRACKS || (typeof TRACKS !== 'undefined' ? TRACKS : null);
  
  if (!Array.isArray(sourceTracks) || sourceTracks.length === 0) {
    document.body.innerHTML = `<div style="padding:40px;"><h2>데이터 로드 실패</h2><p>tracks.js 파일을 찾을 수 없거나 데이터가 비어있습니다.</p></div>`;
    throw new Error("TRACKS_NOT_FOUND");
  }

  // =========================
  // 2. Supabase 설정 (키값 복구)
  // =========================
  const SUPABASE_URL = "https://zididtqghlsxszjkpiuk.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppZGlkdHFnaGxzeHN6amtwaXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MTA3MjMsImV4cCI6MjA5MTA4NjcyM30.Fj0yYiHS071MCMTsdlRv7FMRiijvTyDnalgFaTaxjjw";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const SAVE_KEY = "music_gender_survey_progress_v5";
  const ASSIGNMENT_KEY = "music_gender_assignment_v5";
  const PARTICIPANT_ID_KEY = "music_gender_participant_id_v5";

  const VERSION_GENRE_SETS = [
    ["blues", "jazz", "pop", "rock", "hiphop"],
    ["country", "disco", "reggae", "metal", "classical"],
    ["blues", "country", "pop", "metal", "reggae"],
    ["jazz", "disco", "rock", "classical", "hiphop"]
  ];

  // =========================
  // 5. 유틸 (원래 코드 그대로)
  // =========================
  function saveProgress(jsPsych) { localStorage.setItem(SAVE_KEY, JSON.stringify(jsPsych.data.get().values())); }
  function clearSurveyState() { localStorage.removeItem(SAVE_KEY); localStorage.removeItem(ASSIGNMENT_KEY); localStorage.removeItem(PARTICIPANT_ID_KEY); }
  function getCheckedValue(name) { const el = document.querySelector(`input[name="${name}"]:checked`); return el ? el.value : ""; }
  function getCheckedValues(name) { return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(el => el.value); }
  function shuffle(array) { const arr = [...array]; for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

  function getTracksForGenres(allTracks, selectedGenres) {
    let selectedTracks = [];
    selectedGenres.forEach(genre => {
      const genreTracks = allTracks.filter(t => t.genre === genre);
      const feminine = genreTracks.filter(t => t.style === "feminine");
      const masculine = genreTracks.filter(t => t.style === "masculine");
      const neutral = genreTracks.filter(t => t.style === "neutral");
      if (feminine.length < 2 || masculine.length < 2 || neutral.length < 2) return;
      selectedTracks.push(...shuffle(feminine).slice(0, 2));
      selectedTracks.push(...shuffle(masculine).slice(0, 2));
      selectedTracks.push(...shuffle(neutral).slice(0, 2));
    });
    return shuffle(selectedTracks);
  }

  function getOrCreateParticipantId() {
    const saved = localStorage.getItem(PARTICIPANT_ID_KEY);
    if (saved) return saved;
    const pid = "P_" + Date.now() + "_" + Math.random().toString(36).slice(2, 10);
    localStorage.setItem(PARTICIPANT_ID_KEY, pid);
    return pid;
  }

  async function getGlobalVersionIndex() {
    const { data, error } = await supabaseClient.rpc("get_and_increment_assignment_counter");
    if (error) throw error;
    return data % VERSION_GENRE_SETS.length;
  }

  // ★ 핵심 수정: 빈 배정을 체크하고 강제로 새로 만드는 로직 보강 ★
  async function getOrCreateAssignment() {
    const saved = localStorage.getItem(ASSIGNMENT_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed && Array.isArray(parsed.tracks) && parsed.tracks.length > 0) {
          return parsed;
        }
      } catch (e) {}
    }

    const versionIndex = await getGlobalVersionIndex();
    const selectedGenres = VERSION_GENRE_SETS[versionIndex];
    const tracks = getTracksForGenres(sourceTracks, selectedGenres);

    const assignment = { versionIndex, selectedGenres, tracks };
    localStorage.setItem(ASSIGNMENT_KEY, JSON.stringify(assignment));
    return assignment;
  }

  // =========================
  // 8. 응답 저장 (원래 필드 유지)
  // =========================
  function extractStructuredData(allData, participantId, assignment) {
    let background = null; let freeResponse = null;
    const trialData = allData.filter(row => row.page_type === "music_trial");
    
    allData.forEach(row => {
      if (row.page_type === "background") background = row.response;
      if (row.page_type === "free_response") freeResponse = row.response;
    });

    return {
      participant_id: participantId,
      assigned_version: assignment.versionIndex,
      selected_genres: assignment.selectedGenres,
      background: background,
      free_response: freeResponse,
      trial_data: trialData
    };
  }

  async function saveResultsToSupabase(jsPsych, participantId, assignment) {
    const allData = jsPsych.data.get().values();
    const payload = extractStructuredData(allData, participantId, assignment);
    const { error } = await supabaseClient.from("survey_results").insert([payload]);
    if (error) throw error;
  }

  // =========================
  // 9. 메인 실행 (원래 타임라인 복구)
  // =========================
  (async () => {
    try {
      const participantId = getOrCreateParticipantId();
      const assignment = await getOrCreateAssignment();
      const PARTICIPANT_TRACKS = assignment.tracks;

      const jsPsych = initJsPsych({
        show_progress_bar: true,
        auto_update_progress_bar: true,
        on_trial_finish: () => saveProgress(jsPsych)
      });

      let timeline = [];

      // [시작 화면] 원래 문구 그대로
      timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `
          <div class="survey-wrap">
            <h2>음악 인상 설문</h2>
            <p><strong>안녕하세요. 저는 본 설문지를 제작한 이화여자대학교 생명과학전공 배민영입니다.</strong></p>
            <p>본 설문은 음악의 <strong>도입부 10초</strong>를 들었을 때 사람들이 어떤 인상을 받는지 알아보기 위한 연구의 일환으로 진행됩니다.</p>
            <p>설문 종료 후 추첨을 통해 <strong>세 분께 스타벅스 기프티콘</strong>을 드릴 예정입니다.</p>
          </div>
        `,
        choices: ["시작하기"]
      });

      // [배경 문항] 원래 필드 그대로
      timeline.push({
        type: jsPsychSurveyHtmlForm,
        data: { page_type: "background" },
        preamble: `<div class="survey-wrap"><h2>배경 문항</h2></div>`,
        html: `
          <div class="question-block"><div class="question-title">이름</div><input name="name" type="text" /></div>
          <div class="question-block"><div class="question-title">나이</div><input name="age" type="number" min="1" /></div>
          <div class="question-block">
            <div class="question-title">젠더</div>
            <label><input type="radio" name="gender" value="female"> 여성</label>
            <label><input type="radio" name="gender" value="male"> 남성</label>
            <label><input type="radio" name="gender" value="nonbinary"> 논바이너리/기타</label>
          </div>
          <div class="question-block"><div class="question-title">국적</div><input name="nationality" type="text" /></div>
          <div class="question-block">
            <div class="question-title">음악 청취 빈도</div>
            <label><input type="radio" name="listening_freq" value="rarely"> 거의 듣지 않음</label>
            <label><input type="radio" name="listening_freq" value="often"> 자주 듣는 편</label>
          </div>
          <div class="question-block"><div class="question-title">전화번호 (선택)</div><input name="phone_number" type="text" /></div>
        `,
        button_label: "다음"
      });

      // [자극별 문항] Q1~Q5 완벽 복구
      PARTICIPANT_TRACKS.forEach((track, idx) => {
        timeline.push({
          type: jsPsychSurveyHtmlForm,
          data: {
            page_type: "music_trial",
            track_id: track.id,
            genre: track.genre,
            style: track.style
          },
          preamble: `
            <div class="survey-wrap">
              <h2>음악 듣기 (${idx + 1} / ${PARTICIPANT_TRACKS.length})</h2>
              <div class="question-block">
                <audio controls src="${track.file}"></audio>
              </div>
            </div>
          `,
          html: `
            <div class="question-block">
              <div class="question-title">Q1. 이 음악은 젠더화된 이미지를 떠올리게 했나요?</div>
              <label><input type="radio" name="q1" value="1"> 1. 전혀 떠오르지 않았다</label>
              <label><input type="radio" name="q1" value="2"> 2. 거의 떠오르지 않음</label>
              <label><input type="radio" name="q1" value="3"> 3. 다소 떠오름</label>
              <label><input type="radio" name="q1" value="4"> 4. 매우 강하게 떠오름</label>
            </div>
            <div id="q1_1_block" class="question-block hidden">
              <div class="question-title">Q1-1. 가장 먼저 떠오른 젠더 이미지는 어느 쪽인가요?</div>
              <label><input type="radio" name="q1_1" value="1"> 매우 여성적</label><label><input type="radio" name="q1_1" value="3"> 중성적</label><label><input type="radio" name="q1_1" value="5"> 매우 남성적</label>
            </div>
            <div id="q1_2_block" class="question-block hidden">
              <div class="question-title">Q1-2. 굳이 어울리는 이미지를 골라본다면?</div>
              <label><input type="radio" name="q1_2" value="1"> 매우 여성적</label><label><input type="radio" name="q1_2" value="5"> 매우 남성적</label>
            </div>
            <div class="question-block">
              <div class="question-title">Q2. 확신 정도</div>
              <label><input type="radio" name="q2" value="1"> 전혀 없음</label><label><input type="radio" name="q2" value="5"> 매우 확신</label>
            </div>
            <div class="question-block">
              <div class="question-title">Q3. 영향 요소 (복수응답)</div>
              <label><input type="checkbox" name="q3" value="instrument"> 악기</label><label><input type="checkbox" name="q3" value="rhythm"> 리듬</label><label><input type="checkbox" name="q3" value="mood"> 분위기</label>
            </div>
            <div class="question-block">
              <div class="question-title">Q4. 예상 장르</div>
              <label><input type="checkbox" name="q4" value="pop"> 팝</label><label><input type="checkbox" name="q4" value="rock"> 락</label><label><input type="checkbox" name="q4" value="jazz"> 재즈</label>
            </div>
          `,
          button_label: "다음 곡으로",
          on_load: () => {
            const q1Radios = document.querySelectorAll('input[name="q1"]');
            const update = () => {
              const val = getCheckedValue("q1");
              document.getElementById("q1_1_block").classList.toggle("hidden", val < "3");
              document.getElementById("q1_2_block").classList.toggle("hidden", val >= "3" || val === "");
            };
            q1Radios.forEach(r => r.addEventListener("change", update));
          },
          on_finish: (data) => {
            data.response = {
              q1: getCheckedValue("q1"), q1_1: getCheckedValue("q1_1"), q1_2: getCheckedValue("q1_2"),
              q2: getCheckedValue("q2"), q3: getCheckedValues("q3"), q4: getCheckedValues("q4")
            };
          }
        });
      });

      // [자유 서술] 원래 문항 그대로
      timeline.push({
        type: jsPsychSurveyHtmlForm,
        data: { page_type: "free_response" },
        html: `
          <div class="question-block"><div class="question-title">어떤 음악이 남성적이었나요?</div><textarea name="free_masculine"></textarea></div>
          <div class="question-block"><div class="question-title">어떤 음악이 여성적이었나요?</div><textarea name="free_feminine"></textarea></div>
          <div class="question-block"><div class="question-title">본인의 판단 기준은?</div><textarea name="free_criteria"></textarea></div>
        `,
        button_label: "제출하기"
      });

      // [제출 및 종료]
      timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: "<h2>설문을 완료하시겠습니까?</h2>",
        choices: ["최종 제출"],
        on_finish: async () => {
          try {
            await saveResultsToSupabase(jsPsych, participantId, assignment);
            clearSurveyState();
          } catch(e) { alert("저장 실패. 연구자에게 문의하세요."); }
        }
      });

      timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: "<h2>참여해주셔서 감사합니다.</h2>",
        choices: ["종료"]
      });

      jsPsych.run(timeline);

    } catch (err) {
      console.error(err);
    }
  })();
</script>
</html>
